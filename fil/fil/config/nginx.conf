# ============================================================
# ShopTech — Configuration serveur VPS
# Fichier : nginx.conf (reverse proxy devant Node.js)
# Serveur : Ubuntu 22.04, VPS OVH (4 vCPU, 8 Go RAM, 80 Go SSD)
# ============================================================

# Note : Nginx a été installé mais très peu configuré.
# La plupart des paramètres sont restés par défaut.

worker_processes 1;                     # [PROBLÈME] 1 seul worker pour 4 vCPU → sous-utilisation

events {
    worker_connections 512;             # [PROBLÈME] Trop bas pour 50K visiteurs/jour
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Pas de gzip activé                # [PROBLÈME] Assets non compressés → bande passante gaspillée
    # gzip off; (valeur par défaut)

    # Pas de cache pour les fichiers statiques  # [PROBLÈME] Pas de headers cache-control

    server {
        listen 80;                      # [PROBLÈME] HTTP uniquement, pas de HTTPS/TLS !
        server_name shoptech.fr www.shoptech.fr;

        # Pas de redirection HTTP → HTTPS

        location / {
            proxy_pass http://127.0.0.1:3000;
            # Pas de proxy_set_header X-Real-IP
            # Pas de proxy_set_header X-Forwarded-For
            # Pas de proxy_set_header X-Forwarded-Proto
            # → L'application ne connaît pas l'IP réelle du client
        }

        location /uploads {
            alias /var/www/shoptech/uploads;    # Accès direct aux fichiers uploadés
            autoindex on;                       # [PROBLÈME] Listing des répertoires activé !
        }

        # Pas de rate limiting configuré
        # Pas de limite de taille de requête (client_max_body_size = 1m par défaut)
        # Pas de protection des headers (server_tokens on par défaut → version Nginx exposée)
    }
}
